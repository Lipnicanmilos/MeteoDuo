<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MeteoDuo – blesky</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #0b1220; }
  /* fixed+inset drží iframe presne na viditeľnej ploche aj na mobile
     (100vh presahuje pod adresný riadok a orezáva okraje mapy) */
  iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; display: block; }
  /* vľavo, ale nižšie — vľavo hore má Blitzortung vlastné logo */
  .back {
    position: fixed; z-index: 10;
    top: calc(env(safe-area-inset-top, 0px) + 3.4rem);
    left: calc(env(safe-area-inset-left, 0px) + .8rem);
    background: rgba(15, 23, 42, .88); color: #fff; text-decoration: none;
    font: 700 1rem/1 system-ui, sans-serif;
    padding: .7rem 1.1rem; border-radius: 12px;
    box-shadow: 0 2px 10px rgba(0, 0, 0, .35);
  }
  .back:hover { background: rgba(15, 23, 42, .98); }
</style>
</head>
<body>
<a class="back" href="/">← MeteoDuo</a>
<script>
  // súradnice z URL (?lat=..&lon=..), inak stred Slovenska
  const p = new URLSearchParams(location.search);
  const lat = parseFloat(p.get("lat")) || 48.7;
  const lon = parseFloat(p.get("lon")) || 19.5;
  const zoom = parseInt(p.get("zoom")) || (p.get("lat") ? 9 : 7);

  // Cookies=0 a Advertisment=0 vypnú AdSense aj cookie lištu vnútri mapy,
  // InfoDiv=0 skryje úvodný panel s popisom cez pol mapy.
  // Polohu berie mapbox z hashu (#zoom/lat/lon). Hash sa ale neposiela na server,
  // takže bez rozlišovacieho parametra by mala každá obec rovnakú URL a prehliadač
  // by iframe recykloval aj s predošlou polohou — preto ho pridávame aj do query.
  const f = document.createElement("iframe");
  f.title = "Blesky – Blitzortung.org";
  f.src = "https://map.blitzortung.org/index.php?interactive=1" +
          "&FullScreenControl=0&InfoDiv=0&Cookies=0&Advertisment=0" +
          "&_pos=" + lat + "," + lon +
          "#" + zoom + "/" + lat + "/" + lon;
  document.body.appendChild(f);
</script>
</body>
</html>
