<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeteoDuo – dve predpovede vedľa seba</title>
<meta name="description" content="Predpoveď počasia pre slovenské obce z viacerých zdrojov naraz: yr.no (MET Norway), meteogramy SHMÚ a porovnanie modelov ECMWF, ICON a GFS. Výstrahy SHMÚ, UV index, východ a západ slnka, zrážkový radar a mapa bleskov.">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<!-- React je self-hostovaný (18.3.1) — z CDN bol jedinou cudzou závislosťou
     na kritickej ceste, výpadok unpkg.com by znamenal prázdnu stránku -->
<script src="/vendor/react.production.min.js"></script>
<script src="/vendor/react-dom.production.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #2563eb;
    --accent:  #0ea5e9;
    --grad:    linear-gradient(135deg, #2563eb, #0ea5e9);
    --bg:      #f1f5f9;
    --surface: #ffffff;
    --text:    #0f172a;
    --muted:   #64748b;
    --border:  #e2e8f0;
    --shadow:  0 4px 20px rgba(37,99,235,.08);
    --card-grad:   linear-gradient(135deg, #eff6ff, #f0f9ff);
    --card-border: #dbeafe;
    --chip-warn-bg: #fef3c7;
    --chip-warn-fg: #b45309;
  }
  /* tmavý režim: predvolene podľa systému, prepínač (data-theme) má prednosť */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:      #0b1220;
      --surface: #131c2e;
      --text:    #e2e8f0;
      --muted:   #94a3b8;
      --border:  #2a3852;
      --shadow:  0 4px 20px rgba(0,0,0,.45);
      --card-grad:   linear-gradient(135deg, #172033, #131c2e);
      --card-border: #2a3852;
      --chip-warn-bg: #3a2e12;
      --chip-warn-fg: #fbbf24;
    }
  }
  :root[data-theme="dark"] {
    --bg:      #0b1220;
    --surface: #131c2e;
    --text:    #e2e8f0;
    --muted:   #94a3b8;
    --border:  #2a3852;
    --shadow:  0 4px 20px rgba(0,0,0,.45);
    --card-grad:   linear-gradient(135deg, #172033, #131c2e);
    --card-border: #2a3852;
    --chip-warn-bg: #3a2e12;
    --chip-warn-fg: #fbbf24;
  }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    transition: background .3s, color .3s;
  }
  header {
    background: var(--grad); color: #fff;
    padding: 1rem 1.5rem;
    display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
  }
  header h1 { font-size: 1.5rem; letter-spacing: -.02em; }
  header .tagline { font-size: .85rem; opacity: .85; }
  .city-picker { margin-left: auto; display: flex; align-items: center; gap: .5rem; }
  .city-picker input {
    padding: .55rem .9rem; border: none; border-radius: 10px;
    font-size: .95rem; min-width: 260px; outline: none;
  }
  .fav-btn {
    background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.45);
    color: #fff; border-radius: 10px; padding: .45rem .65rem; cursor: pointer;
    font-size: 1.05rem; line-height: 1; transition: background .2s;
  }
  .fav-btn:hover { background: rgba(255,255,255,.3); }

  /* prepínač rozsahu predpovede (1 deň / 3 dni) */
  .view-toggle {
    display: flex; border: 1px solid rgba(255,255,255,.45);
    border-radius: 10px; overflow: hidden; background: rgba(255,255,255,.16);
  }
  .view-toggle button {
    border: none; background: none; color: #fff; padding: .45rem .8rem;
    cursor: pointer; font-size: .85rem; font-weight: 600; line-height: 1.2;
    transition: background .2s;
  }
  .view-toggle button:hover { background: rgba(255,255,255,.25); }
  .view-toggle button.active { background: #fff; color: var(--primary); }

  .map-links { display: flex; gap: .4rem; flex-wrap: wrap; }
  .map-link {
    display: inline-block; background: rgba(255,255,255,.16);
    border: 1px solid rgba(255,255,255,.45); color: #fff; text-decoration: none;
    border-radius: 10px; padding: .45rem .8rem; font-size: .85rem;
    font-weight: 600; line-height: 1.2; white-space: nowrap; transition: background .2s;
  }
  .map-link:hover { background: rgba(255,255,255,.3); }

  /* obľúbené obce */
  .fav-bar {
    display: flex; gap: .5rem; overflow-x: auto;
    padding: .8rem 1.25rem 0; max-width: 1600px; margin: 0 auto;
    -webkit-overflow-scrolling: touch;
  }
  .fav-chip {
    display: inline-flex; align-items: center; gap: .3rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 50px; padding: .35rem .45rem .35rem .9rem;
    font-size: .85rem; font-weight: 600; cursor: pointer;
    white-space: nowrap; transition: all .2s; flex-shrink: 0;
  }
  .fav-chip:hover { border-color: var(--primary); color: var(--primary); }
  .fav-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .fav-chip .x {
    border: none; background: none; cursor: pointer; font-size: .75rem;
    color: inherit; opacity: .55; padding: .1rem .3rem; line-height: 1;
  }
  .fav-chip .x:hover { opacity: 1; }
  main {
    display: grid; grid-template-columns: 1fr 1.1fr 1fr;
    gap: 1.25rem; padding: 1.25rem; max-width: 1600px; margin: 0 auto;
  }
  /* pod 1100px: panely pod sebou, súhrn (stred) ako prvý */
  @media (max-width: 1100px) {
    main { grid-template-columns: 1fr; }
    .panel-center { order: -1; }
    .panel { min-height: 0; }
  }
  .panel {
    background: var(--surface); border-radius: 16px; box-shadow: var(--shadow);
    border: 1px solid var(--border); padding: 1.25rem; min-height: 300px;
    min-width: 0; /* grid item nesmie rásť podľa obsahu (scroll meteogramu) */
  }
  .panel h2 {
    font-size: 1.05rem; margin-bottom: 1rem; display: flex;
    align-items: center; gap: .5rem; color: var(--primary);
  }
  .panel h2 .src { font-size: .72rem; color: var(--muted); font-weight: 400; }

  /* stred */
  .place { text-align: center; margin-bottom: 1.25rem; }
  .place .name { font-size: 1.9rem; font-weight: 800; letter-spacing: -.02em; }
  .place .coords { color: var(--muted); font-size: .8rem; }
  .freshness {
    margin-top: .5rem; font-size: .78rem; color: var(--muted);
    display: inline-block; padding: .2rem .6rem; border-radius: 50px;
    border: 1px solid var(--border);
  }
  .freshness .age { opacity: .75; }
  .freshness.stale {
    background: var(--chip-warn-bg); color: var(--chip-warn-fg);
    border-color: transparent; font-weight: 600;
  }
  .day-cards { display: flex; flex-direction: column; gap: .9rem; }
  .day-card {
    background: var(--card-grad);
    border: 1px solid var(--card-border); border-radius: 14px;
    padding: 1rem 1.2rem;
  }
  .day-card .row {
    display: grid; grid-template-columns: 90px 56px 1fr auto;
    align-items: center; gap: .9rem;
  }
  .day-card .dayname { font-weight: 700; text-transform: capitalize; }
  .day-card .dayname small { display: block; color: var(--muted); font-weight: 400; }
  .day-card .emoji { font-size: 2.2rem; text-align: center; }
  .day-card .temps { font-size: 1.35rem; font-weight: 700; }
  .day-card .temps .min { color: var(--muted); font-weight: 400; font-size: 1.05rem; }
  .day-card .precip { color: var(--primary); font-weight: 600; font-size: .9rem; white-space: nowrap; }
  /* východ/západ slnka + UV (bod 5) */
  .day-card .sun {
    display: flex; gap: 1rem; flex-wrap: wrap; margin-top: .7rem;
    padding-top: .6rem; border-top: 1px dashed var(--card-border);
    font-size: .8rem; color: var(--muted);
  }
  .day-card .sun span { display: inline-flex; align-items: center; gap: .25rem; }
  .day-card .sun .uv b { color: var(--text); font-weight: 700; }
  .uv-pill {
    display: inline-block; min-width: 1.4rem; text-align: center;
    border-radius: 6px; padding: .05rem .35rem; font-weight: 700;
    font-size: .75rem; color: #fff;
  }

  /* výstrahy (bod 4) */
  .warn-bar { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 1rem; }
  .warn {
    display: flex; align-items: flex-start; gap: .55rem;
    border-left: 4px solid var(--wc); background: color-mix(in srgb, var(--wc) 12%, var(--surface));
    border-radius: 8px; padding: .55rem .7rem; text-align: left;
  }
  .warn .wi { font-size: 1.15rem; line-height: 1.3; }
  .warn .wt { font-size: .85rem; line-height: 1.35; }
  .warn .wt b { color: var(--wc); }
  .warn .wt .wmeta { color: var(--muted); font-size: .75rem; display: block; margin-top: .1rem; }
  .warn-badge {
    display: inline-block; margin-left: .5rem; vertical-align: middle;
    font-size: .95rem; line-height: 1;
  }

  /* sparkliny v porovnaní (bod 6a) */
  .spark-summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: .7rem; margin-bottom: 1rem;
  }
  .spark-card {
    border: 1px solid var(--border); border-radius: 12px; padding: .7rem .85rem;
    background: var(--card-grad);
  }
  .spark-card .sh { font-size: .8rem; font-weight: 700; margin-bottom: .5rem; white-space: nowrap; }
  .spark-card .sh small { color: var(--muted); font-weight: 400; }
  .spark-row { display: flex; align-items: center; gap: .5rem; margin-top: .35rem; }
  .spark-row .lbl { font-size: .68rem; color: var(--muted); width: 3.3rem; flex-shrink: 0; }
  .spark-row svg { flex: 1; height: 30px; display: block; }
  .spark-row .val { font-size: .72rem; color: var(--muted); white-space: nowrap; }

  /* prepínač témy (bod 6c) */
  .theme-btn {
    background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.45);
    color: #fff; border-radius: 10px; padding: .45rem .65rem; cursor: pointer;
    font-size: 1.05rem; line-height: 1; transition: background .2s;
  }
  .theme-btn:hover { background: rgba(255,255,255,.3); }

  /* yr hodinovka */
  .day-block { margin-bottom: 1.1rem; }
  .day-block h3 { font-size: .85rem; color: var(--muted); text-transform: capitalize; margin-bottom: .4rem; }
  table.hours { width: 100%; border-collapse: collapse; font-size: .87rem; }
  table.hours td { padding: .3rem .35rem; border-top: 1px solid var(--border); }
  table.hours td.h { color: var(--muted); width: 3.2rem; }
  table.hours td.e { width: 2rem; text-align: center; }
  table.hours td.t { font-weight: 700; width: 3.6rem; }
  table.hours td.p { color: var(--primary); width: 4.5rem; }
  table.hours td.w { color: var(--muted); text-align: right; }

  /* meteogram */
  .mg-tabs { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: .8rem; }
  .mg-tabs button {
    border: 1px solid var(--border); background: var(--surface); border-radius: 50px;
    padding: .3rem .7rem; font-size: .78rem; font-weight: 600; cursor: pointer;
    color: var(--muted); transition: all .2s; white-space: nowrap;
  }
  .mg-tabs button:hover { border-color: var(--primary); color: var(--primary); }
  .mg-tabs button.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  .meteogram-wrap { text-align: center; }
  .meteogram-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; position: relative; }
  .meteogram-wrap img { max-width: 100%; border-radius: 8px; }

  /* lupa — len zariadenia s myšou */
  @media (hover: hover) and (pointer: fine) {
    .meteogram-scroll img { cursor: zoom-in; }
    .zoom-lens {
      position: absolute; width: 340px; height: 340px; border-radius: 50%;
      border: 3px solid var(--primary); pointer-events: none;
      background-repeat: no-repeat; background-color: #fff;
      box-shadow: 0 8px 30px rgba(15,23,42,.35), inset 0 0 8px rgba(15,23,42,.15);
      z-index: 10;
    }
  }
  .note { font-size: .75rem; color: var(--muted); margin-top: .6rem; line-height: 1.5; }

  /* lightbox — zväčšený meteogram na stred obrazovky */
  .lightbox {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(15,23,42,.78);
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem; cursor: zoom-out;
  }
  .lightbox img {
    max-width: 96vw; max-height: 94vh; border-radius: 10px;
    background: #fff; box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }

  /* porovnávacia tabuľka — cez celú šírku */
  .compare { grid-column: 1 / -1; }
  .compare-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table.compare-table { width: 100%; border-collapse: collapse; font-size: .92rem; min-width: 640px; }
  table.compare-table th {
    text-align: left; font-size: .72rem; text-transform: uppercase; letter-spacing: .03em;
    color: var(--muted); font-weight: 700; padding: .4rem .7rem .55rem;
    border-bottom: 2px solid var(--border);
  }
  table.compare-table td { padding: .55rem .7rem; }
  table.compare-table tr.day-top td { border-top: 1px solid var(--border); }
  table.compare-table tr:first-child td { border-top: none; }
  .compare-table .c-day { vertical-align: middle; }
  .compare-table .c-day .dn { font-weight: 700; text-transform: capitalize; display: block; }
  .compare-table .c-day small { color: var(--muted); font-weight: 400; }
  .compare-table .src { white-space: nowrap; font-weight: 600; }
  .compare-table .src .sub { color: var(--muted); font-weight: 400; font-size: .72rem; }
  .compare-table .sym { text-align: center; font-size: 1.05rem; width: 2.2rem; }
  .compare-table .tmax { font-weight: 700; }
  .compare-table .tmin { color: var(--muted); }
  .compare-table .prec { color: var(--primary); white-space: nowrap; }
  .compare-table .wind { color: var(--muted); white-space: nowrap; }
  .compare-table .delta {
    display: inline-block; margin: .25rem .25rem 0 0;
    font-size: .68rem; font-weight: 700; color: #b45309;
    background: #fef3c7; border-radius: 6px; padding: .1rem .35rem; white-space: nowrap;
  }
  .compare-table .c-day .delta { display: block; width: fit-content; }

  .status { text-align: center; color: var(--muted); padding: 2.5rem 1rem; }
  .error { color: #b91c1c; background: #fef2f2; border: 1px solid #fecaca;
           border-radius: 10px; padding: .8rem 1rem; font-size: .9rem; }
  footer {
    text-align: center; color: var(--muted); font-size: .78rem;
    padding: 1.25rem; line-height: 1.6;
  }
  footer a { color: var(--primary); }

  /* mobil */
  @media (max-width: 640px) {
    header { padding: .8rem 1rem; gap: .6rem; }
    header h1 { font-size: 1.25rem; }
    header .tagline { font-size: .75rem; }
    .city-picker { margin-left: 0; width: 100%; }
    .city-picker input { min-width: 0; flex: 1; font-size: 16px; } /* 16px = iOS nezoomuje */
    .fav-bar { padding: .6rem .75rem 0; }
    main { padding: .75rem; gap: .75rem; }
    /* väčšie dotykové ciele (odporúčaných ~44px) */
    .view-toggle button { padding: .7rem .9rem; }
    .map-link { padding: .7rem .9rem; }
    .fav-btn, .theme-btn { padding: .65rem .8rem; }
    .fav-chip { padding: .55rem .55rem .55rem 1rem; }
    .fav-chip .x { padding: .3rem .45rem; font-size: .85rem; }
    .mg-tabs button { padding: .55rem .85rem; font-size: .8rem; }
    .panel { padding: 1rem; border-radius: 12px; }
    .place .name { font-size: 1.5rem; }
    .day-card { padding: .8rem .9rem; }
    .day-card .row { grid-template-columns: 72px 44px 1fr auto; gap: .5rem; }
    .day-card .emoji { font-size: 1.7rem; }
    .day-card .temps { font-size: 1.15rem; }
    .day-card .precip { font-size: .8rem; }
    table.hours { font-size: .82rem; }
    /* meteogram nechaj čitateľný — posúva sa do strán prstom */
    .meteogram-scroll img { min-width: 640px; max-width: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script defer src="/app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
