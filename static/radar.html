<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MeteoDuo – radar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  /* fixed+inset drží iframe presne na viditeľnej ploche aj na mobile
     (100vh presahuje pod adresný riadok a orezáva okraje mapy) */
  iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; display: block; }
  .back {
    position: fixed; z-index: 10;
    top: calc(env(safe-area-inset-top, 0px) + .8rem);
    left: calc(env(safe-area-inset-left, 0px) + .8rem);
    background: rgba(15, 23, 42, .88); color: #fff; text-decoration: none;
    font: 700 1rem/1 system-ui, sans-serif;
    padding: .7rem 1.1rem; border-radius: 12px;
    box-shadow: 0 2px 10px rgba(0, 0, 0, .35);
  }
  .back:hover { background: rgba(15, 23, 42, .98); }
</style>
</head>
<body>
<a class="back" href="/">← MeteoDuo</a>
<script>
  // súradnice z URL (?lat=..&lon=..), inak stred Slovenska
  const p = new URLSearchParams(location.search);
  const lat = parseFloat(p.get("lat")) || 48.7;
  const lon = parseFloat(p.get("lon")) || 19.5;
  const zoom = parseInt(p.get("zoom")) || (p.get("lat") ? 9 : 7);
  const marker = p.get("lat") ? "&marker=true" : "";

  const f = document.createElement("iframe");
  f.title = "Radar – Windy";
  f.src = "https://embed.windy.com/embed.html?type=map&location=coordinates" +
          "&overlay=radar&level=surface&metricRain=mm" +
          "&zoom=" + zoom + "&lat=" + lat + "&lon=" + lon +
          "&detailLat=" + lat + "&detailLon=" + lon +
          marker + "&message=true&calendar=now";
  document.body.appendChild(f);
</script>
</body>
</html>
