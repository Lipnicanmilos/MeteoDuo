name: Build Android widget

# Zbuildí APK v cloude (runner má Android SDK) a nahrá ho do Releasu
# `widget-latest`, na ktorý ukazuje tlačidlo na webovej stránke /widget.
# Netreba lokálne Android Studio ani žiadny secret — stačí GITHUB_TOKEN.

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.7
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk meteoduo-widget.apk

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: widget-latest
          name: MeteoDuo Widget (najnovší build)
          files: meteoduo-widget.apk
          body: |
            Automaticky zbuildený Android widget (debug APK).

            Inštalácia: stiahni na Androide, otvor, povoľ „Inštalovať neznáme aplikácie",
            prípadne Play Protect → „Aj tak nainštalovať".

            Pozn.: ide o debug podpis — aktualizácia na novšiu verziu môže vyžadovať
            najprv odinštalovanie starej. Stabilný release podpis vieme doplniť neskôr.
