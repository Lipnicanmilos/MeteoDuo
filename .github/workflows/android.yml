name: Build Android widget

# Zbuildí APK v cloude (runner má Android SDK) a nahrá ho do Releasu
# `widget-latest`, na ktorý ukazuje tlačidlo na webovej stránke /widget.
# Netreba lokálne Android Studio ani žiadny secret — stačí GITHUB_TOKEN.

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          sudo unzip -q -d /opt /tmp/gradle.zip
          echo "/opt/gradle-8.7/bin" >> "$GITHUB_PATH"

      - name: Ensure signing keystore (generate once, commit)
        working-directory: android
        run: |
          if [ ! -f app/meteoduo-release.jks ]; then
            keytool -genkeypair -v \
              -keystore app/meteoduo-release.jks \
              -storepass meteoduo -keypass meteoduo -alias meteoduo \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=MeteoDuo, O=MeteoDuo, C=SK"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add app/meteoduo-release.jks
            git commit -m "android: release keystore pre stabilny podpis [skip ci]"
            git push origin HEAD:main
          fi

      - name: Build release APK
        working-directory: android
        run: |
          set -o pipefail
          gradle assembleRelease --no-daemon --stacktrace 2>&1 | tee "$GITHUB_WORKSPACE/build.log"

      - name: Upload build log on failure
        if: failure()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-logs
          name: CI build log
          files: build.log

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk meteoduo-widget.apk

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: widget-latest
          name: MeteoDuo Widget (najnovší build)
          files: meteoduo-widget.apk
          body: |
            Automaticky zbuildený Android widget (podpísaný release APK).

            Inštalácia: stiahni na Androide, otvor, povoľ „Inštalovať neznáme aplikácie",
            prípadne Play Protect → „Aj tak nainštalovať".

            Aktualizácie: nová verzia sa nainštaluje „cez" starú bez odinštalovania
            (stabilný podpis).
